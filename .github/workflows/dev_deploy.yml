name: Deploy to DEV

on:
  workflow_call:
  workflow_dispatch:

jobs:
  dev-deploy:
    name: Deploy to DEV environment
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Install Kamal gem
        run: |
          KAMAL_VERSION=$(ruby -rbundler -e "puts Bundler.locked_gems.specs.find { |s| s.name == 'kamal' }&.version")
          gem install kamal -v $KAMAL_VERSION

      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEV_DEPLOY_KEY }}

      - name: Run deploy command
        env:
          KAMAL_REGISTRY_USERNAME: ${{ secrets.KAMAL_REGISTRY_USERNAME }}
          KAMAL_REGISTRY_PASSWORD: ${{ secrets.KAMAL_REGISTRY_PASSWORD }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CONNECTOR__ZAMMAD_API_TOKEN: ${{ secrets.CONNECTOR__ZAMMAD_API_TOKEN }}
          CONNECTOR__ZAMMAD_WEBHOOK_SECRET: ${{ secrets.CONNECTOR__ZAMMAD_WEBHOOK_SECRET }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LEGACY_DB_URL: ${{ secrets.LEGACY_DB_URL }}
          SECRET_KEY_BASE: ${{ secrets.SECRET_KEY_BASE }}
          TRIAGE_ZAMMAD_API_TOKEN: ${{ secrets.TRIAGE_ZAMMAD_API_TOKEN }}
          TRIAGE_ZAMMAD_WEBHOOK_SECRET: ${{ secrets.TRIAGE_ZAMMAD_WEBHOOK_SECRET }}
          DEFAULT_USER_EMAIL: ${{ vars.DEFAULT_USER_EMAIL }}
          DEFAULT_USER_FIRSTNAME: ${{ vars.DEFAULT_USER_FIRSTNAME }}
          DEFAULT_USER_LASTNAME: ${{ vars.DEFAULT_USER_LASTNAME }}
          DEFAULT_USER_ZAMMAD_IDENTIFIER: ${{ vars.DEFAULT_USER_ZAMMAD_IDENTIFIER }}
          LEGACY_PORTAL_URL: ${{ vars.LEGACY_PORTAL_URL }}
          CONNECTOR__OPS_API_URL: ${{ vars.CONNECTOR__OPS_API_URL }}
          CONNECTOR_WEBHOOK_URL: ${{ vars.CONNECTOR_WEBHOOK_URL }}
          CONNECTOR__ZAMMAD_URL: ${{ vars.CONNECTOR__ZAMMAD_URL }}
          TRIAGE_ZAMMAD_URL: ${{ vars.TRIAGE_ZAMMAD_URL }}      

        run: kamal deploy -d staging
