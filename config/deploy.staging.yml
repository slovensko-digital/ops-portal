servers:
  web:
    hosts:
      - dev.slovensko.digital
  worker:
    hosts:
      - dev.slovensko.digital

x-load-env:
  - "<% require 'dotenv'; Dotenv.load('.env.staging') %>"

env:
  clear:
    RAILS_ENV: production
    RAILS_LOG_LEVEL: debug
    LEGACY_PORTAL_URL: <%= ENV.fetch("LEGACY_PORTAL_URL") %>
    CONNECTOR__OPS_API_URL: <%= ENV.fetch("CONNECTOR__OPS_API_URL") %>
    CONNECTOR_WEBHOOK_URL: <%= ENV.fetch("CONNECTOR_WEBHOOK_URL") %>
    CMS_ROOT_CATEGORY_ID: <%= ENV.fetch("CMS_ROOT_CATEGORY_ID") %>
    CMS_AI_CATEGORY_ID: <%= ENV.fetch("CMS_AI_CATEGORY_ID") %>
    TRIAGE_ZAMMAD_URL: <%= ENV.fetch("TRIAGE_ZAMMAD_URL") %>
    APP_HOST: ops.dev.slovensko.digital
    NOTIFICATION_SMTP_USERNAME: <%= ENV.fetch("NOTIFICATION_SMTP_USERNAME") %>
    NOTIFICATION_SMTP_SERVER: <%= ENV.fetch("NOTIFICATION_SMTP_SERVER") %>
    NOTIFICATION_SMTP_PORT: <%= ENV.fetch("NOTIFICATION_SMTP_PORT") %>
    DISCOURSE_URL: <%= ENV.fetch("DISCOURSE_URL") %>
    DISCOURSE_API_USERNAME: <%= ENV.fetch("DISCOURSE_API_USERNAME") %>
    DISCOURSE_IMPORT_CATEGORY_IDS: <%= ENV.fetch("DISCOURSE_IMPORT_CATEGORY_IDS") %>

proxy:
  host: ops.dev.slovensko.digital

volumes:
  - "ops_portal_storage:/rails/storage"

ssh:
  user: kamal
